<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" fill="#1e1e1e"><tspan x="80.0" y="28.0">DataQuest — System Architecture</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#868e96"><tspan x="80.0" y="56.0">Point-in-time (vintage) macro-data service  ·  read-never-fetches  ·  per-series licence gate</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#f08c00"><tspan x="98.0" y="112.0">UPSTREAM SOURCES  —  public-domain / GREEN</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="280.0" y="161.6">ALFRED / FRED API</tspan><tspan x="280.0" y="177.9">US macro vintages (BLS · BEA · Census · Fed · Treasury)</tspan><tspan x="280.0" y="194.1">regime A vintages  +  ALFRED_LATEST for rates (regime B)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="670.0" y="161.6">ECB reference rates</tspan><tspan x="670.0" y="177.9">euro FX (EUR/USD), XML</tspan><tspan x="670.0" y="194.1">regime B  ·  commercial_ok = TRUE</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="1060.0" y="161.6">Philadelphia Fed RTDS</tspan><tspan x="1060.0" y="177.9">Real-Time Data Set (files)</tspan><tspan x="1060.0" y="194.1">regime A vintages  ·  off-FRED re-source</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#1971c2"><tspan x="98.0" y="320.0">INGEST WORKER  —  sync · scheduled · off the request path  (Fly scheduled machine)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#1e1e1e"><tspan x="670.0" y="365.2">run.py  —  for each catalog series:  fetch → normalize → load   (uv run python -m app.ingest.run)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="390.0" y="434.6">TET Fetcher  (one per source)</tspan><tspan x="390.0" y="450.9">transform_query → extract_data → transform_data</tspan><tspan x="390.0" y="467.1">→ QdfRow[] + Provenance   ·   Fetchers: Alfred · FredLatest · Ecb · PhillyFedRtds</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="965.0" y="434.6">Ground-or-skip on typed errors</tspan><tspan x="965.0" y="450.9">EmptyData · Unavailable · NeedsKey</tspan><tspan x="965.0" y="467.1">a failed fetch is SKIPPED, never stored as a fabricated value</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="670.0" y="530.9">load_rows  →  idempotent upsert · ON CONFLICT (series_id, obs, vintage) DO NOTHING · append-only   (sync engine)</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#2f9e44"><tspan x="98.0" y="650.0">STORE  —  Postgres  (+ TimescaleDB extension)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="260.0" y="711.5">dataproduct</tspan><tspan x="260.0" y="727.8">product_id (PK)</tspan><tspan x="260.0" y="744.0">title · theme · sort_order</tspan><tspan x="260.0" y="760.2">(Fusion-style grouping)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="670.0" y="723.4">series   (catalog)</tspan><tspan x="670.0" y="739.6">series_id = cid_xcat (PK)</tspan><tspan x="670.0" y="755.9">cid · xcat · source · regime A/B</tspan><tspan x="670.0" y="772.1">vintage_capable · commercial_ok</tspan><tspan x="670.0" y="788.4">attribution · qdf_ticker · product_id (FK)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="1070.0" y="723.4">observation   (vintage panel)</tspan><tspan x="1070.0" y="739.6">series_id (FK) · observation_date</tspan><tspan x="1070.0" y="755.9">vintage_date · value</tspan><tspan x="1070.0" y="772.1">UNIQUE (series_id, obs, vintage)</tspan><tspan x="1070.0" y="788.4">PIT INDEX (… , vintage_date DESC)</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#868e96"><tspan x="429.0" y="713.0">1 : N</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#868e96"><tspan x="849.0" y="733.0">1 : N</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#2b8a3e"><tspan x="110.0" y="848.0">Alembic migrations own the schema (tables · the PIT index · the unique constraint).   PIT_SQL = SELECT DISTINCT ON (obs) … WHERE vintage_date &lt;= :as_of ORDER BY obs, vintage_date DESC  (index-only, no Sort).</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#6741d9"><tspan x="98.0" y="980.0">READ API  —  FastAPI  (async · persistent on Fly · NO httpx)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="670.0" y="1023.9">CorrelationId  ▸  CORS  ▸  rate-limit (per client IP)  ▸  RFC-9457 problem+json   ·   GET /health</tspan></text>
<text text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Courier New', monospace" font-size="12" fill="#1e1e1e"><tspan x="218.0" y="1091.5">/series</tspan><tspan x="218.0" y="1106.5">/{ticker}?as_of</tspan><tspan x="218.0" y="1121.5">(PIT core)</tspan><tspan x="218.0" y="1136.5">/panel · /revisions</tspan><tspan x="218.0" y="1151.5">/revision-stats</tspan></text>
<text text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Courier New', monospace" font-size="12" fill="#1e1e1e"><tspan x="446.0" y="1091.5">/catalog</tspan><tspan x="446.0" y="1106.5">/  (filter +</tspan><tspan x="446.0" y="1121.5"> paginate)</tspan><tspan x="446.0" y="1136.5">/reliability</tspan><tspan x="446.0" y="1151.5">/{ticker}</tspan></text>
<text text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Courier New', monospace" font-size="12" fill="#1e1e1e"><tspan x="674.0" y="1091.5">/products</tspan><tspan x="674.0" y="1106.5">/</tspan><tspan x="674.0" y="1121.5">/{id}</tspan><tspan x="674.0" y="1136.5">(grouping +</tspan><tspan x="674.0" y="1151.5"> rollup gate)</tspan></text>
<text text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Courier New', monospace" font-size="12" fill="#1e1e1e"><tspan x="902.0" y="1099.0">/observations</tspan><tspan x="902.0" y="1114.0">/  (bulk PIT,</tspan><tspan x="902.0" y="1129.0"> many tickers,</tspan><tspan x="902.0" y="1144.0"> ONE query)</tspan></text>
<text text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Courier New', monospace" font-size="12" fill="#1e1e1e"><tspan x="1126.0" y="1099.0">/qdf</tspan><tspan x="1126.0" y="1114.0">/  (macrosynergy-</tspan><tspan x="1126.0" y="1129.0"> loadable</tspan><tspan x="1126.0" y="1144.0"> long QDF)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#1e1e1e"><tspan x="670.0" y="1215.5">async engine (asyncpg) · get_async_session   |   PIT_SQL / PIT_SQL_BULK / REVISIONS_SQL   |   LTTB downsample (max_points) · revision_stats (bias test)</tspan></text>
<text text-anchor="start" font-family="ui-monospace, 'Cascadia Code', 'Courier New', monospace" font-size="13" fill="#6741d9"><tspan x="110.0" y="989.0">prefix  /api/v1</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#c2255c"><tspan x="98.0" y="1380.0">DASHBOARD  —  React · Vite · Tailwind · shadcn · ECharts · TanStack Query</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="245.0" y="1437.8">Home</tspan><tspan x="245.0" y="1454.0">(Analysis dashboard)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="530.0" y="1437.8">Data Catalog</tspan><tspan x="530.0" y="1454.0">(product cards)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="810.0" y="1437.8">Data Insights</tspan><tspan x="810.0" y="1454.0">(revision studies)</tspan></text>
<text text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1e1e1e"><tspan x="1095.0" y="1437.8">Open Data Exploration</tspan><tspan x="1095.0" y="1454.0">(catalog browse)</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#e8590c"><tspan x="692.0" y="256.0">①  ONLY the worker fetches upstream  (httpx lives here)</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#1971c2"><tspan x="692.0" y="585.0">②  writes  (sync engine, append-only)</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#2f9e44"><tspan x="692.0" y="905.0">③  reads  (async · asyncpg)  —  read-never-fetches: this app has NO httpx</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#c2255c"><tspan x="692.0" y="1305.0">④  HTTP / JSON  (getJson)  ·  /health badge</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#495057"><tspan x="1338.0" y="320.0">The rules that shape it</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#212529"><tspan x="1340.0" y="354.0">● Read never fetches</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#495057"><tspan x="1354.0" y="372.0">Only the worker holds httpx; the read app</tspan><tspan x="1354.0" y="387.0">has none — enforced by the file tree.</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#212529"><tspan x="1340.0" y="420.0">● Never invent a number</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#495057"><tspan x="1354.0" y="438.0">A failed fetch returns a typed 'unavailable'</tspan><tspan x="1354.0" y="453.0">and is skipped, never a fabricated value.</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#212529"><tspan x="1340.0" y="486.0">● commercial_ok gate</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#495057"><tspan x="1354.0" y="504.0">Per-series licence verdict, default FALSE.</tspan><tspan x="1354.0" y="519.0">TRUE only for a cleared GREEN fetch path;</tspan><tspan x="1354.0" y="534.0">rendered with attribution. Products roll up</tspan><tspan x="1354.0" y="549.0">with a contamination-safe AND.</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#212529"><tspan x="1340.0" y="582.0">● Point-in-time is the moat</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#495057"><tspan x="1354.0" y="600.0">Append-only vintage panel; the PIT query is</tspan><tspan x="1354.0" y="615.0">index-only on (series_id, observation_date,</tspan><tspan x="1354.0" y="630.0">vintage_date DESC).</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#212529"><tspan x="1340.0" y="663.0">● Two Fly deployables</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#495057"><tspan x="1354.0" y="681.0">One Python codebase → a persistent Read API</tspan><tspan x="1354.0" y="696.0">+ a scheduled Worker. Not serverless (a</tspan><tspan x="1354.0" y="711.0">shared pool can't live on Vercel-style</tspan><tspan x="1354.0" y="726.0">functions).</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#212529"><tspan x="1340.0" y="759.0">● QDF channel</tspan></text>
<text text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#495057"><tspan x="1354.0" y="777.0">/qdf emits a long (cid, xcat, real_date,</tspan><tspan x="1354.0" y="792.0">value) frame that loads straight into the</tspan><tspan x="1354.0" y="807.0">open macrosynergy package.</tspan></text>
</svg>