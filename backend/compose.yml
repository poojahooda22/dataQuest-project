services:
  db:
    # Postgres 16 WITH the TimescaleDB extension built in.
    # Pinned to an exact version for reproducible builds (Apache-core features only here).
    image: timescale/timescaledb:2.28.1-pg16
    environment:
      POSTGRES_USER: dataquest
      POSTGRES_PASSWORD: dataquest
      POSTGRES_DB: dataquest
    ports: ["5432:5432"]
    volumes: ["dbdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataquest -d dataquest"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  dbdata:
